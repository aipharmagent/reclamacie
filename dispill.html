<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>Calendrier Pilulier</title>
    <style>
        body
        {
            font-family:courier,sans-serif;
            font-size: 15px;
            position: absolute;
        }

        table{
            border: 1px solid black;
            table-layout: fixed;
        }
        td
        {
            border: 1px solid black;
            width: auto;
            text-align: center;
        }


        @media screen {
            body{
                position:static;
                margin:0;
                min-height:100vh;
                background:linear-gradient(135deg,#eef4ff,#f7faff);
                font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
                display:flex;
                flex-direction:column;
                align-items:center;
                padding:22px 14px;
                gap:14px;
            }
            .ui-panel{
                width:min(860px,95vw);
                background:#fff;
                border:1px solid #d7e1f2;
                border-radius:16px;
                box-shadow:0 12px 28px rgba(15,23,42,.12);
                overflow:hidden;
            }
            .ui-head{
                background:linear-gradient(135deg,#123b87,#1f5fd3);
                color:#fff;
                padding:16px 18px;
            }
            .ui-head h1{margin:0;font-size:24px;font-weight:800}
            .ui-head p{margin:4px 0 0 0;font-size:13px;opacity:.92}
            .ui-body{padding:14px 18px}
            #optionsTable{border:0;table-layout:auto;width:100%;max-width:620px}
            #optionsTable td{border:0;text-align:left;padding:6px 8px;vertical-align:middle}
            #optionsTable td:first-child{font-weight:700;color:#1f2a44;width:120px;min-width:120px}
            #optionsTable input[type="text"],
            #optionsTable input[type="date"]{
                width:280px;max-width:100%;height:32px;padding:4px 8px;
                border:1px solid #b8c5db;border-radius:8px;font:inherit;background:#fff;
            }
            .freq-wrap{display:flex;gap:14px;flex-wrap:wrap}
            .freq-wrap label{display:inline-flex;align-items:center;gap:6px;font-weight:600}
            .actions{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
            .btn{height:36px;min-width:190px;border-radius:10px;border:1px solid #214fb8;background:#2b63e5;color:#fff;font-weight:800;cursor:pointer}
            .btn.secondary{background:#fff;color:#214fb8}
            #printableArea{display:block;clear:both;width:min(900px,95vw);margin:0 auto}
        }

    </style>
</head>
<body>

<script type="text/javascript">

    //New function to add days to a given date.
    Date.prototype.addDays = function(days) {
        var dat = new Date(this.valueOf())
        dat.setUTCDate(dat.getUTCDate() + days);
        return dat;
    }

    function printDiv(divName) {
        var printContents = document.getElementById(divName).innerHTML;
        var originalContents = document.body.innerHTML;

        document.body.innerHTML = printContents;

        window.print();

        document.body.innerHTML = originalContents;
    }
    //GetCurrent
    function calculate() {

        var startDate = new Date(document.getElementById("startDate").value.replace(/-/g, '\/').replace(/T.+/, ''));

        if (document.getElementById("q7j").checked){
            var weekly = 7;
            var endDate = startDate.addDays(244 + (weekly*6));
        }
        if (document.getElementById("q14j").checked){
            var weekly = 14;
            var endDate = startDate.addDays(488 + (weekly*6));
        }
        if (document.getElementById("q28j").checked){
            var weekly = 28;
            var endDate = startDate.addDays(976 + (weekly*6));
        }

        var StartdateArray = new Array();
        var EnddateArray = new Array();
        var beginningDays = new Date(startDate);
        var endingDays = startDate.addDays(weekly-1);
        while (beginningDays <= endDate) {
                var beginningDaysmonth = new Date(beginningDays).getMonth() + 1;
                var endingDaysmonth = new Date(endingDays).getMonth()+1;
                StartdateArray.push(new Date(beginningDays).getUTCDate() + "/" + beginningDaysmonth);
                EnddateArray.push(new Date(endingDays).getUTCDate() + "/" + endingDaysmonth);
                beginningDays.setUTCDate(beginningDays.getUTCDate() + weekly);
                endingDays.setUTCDate(endingDays.getUTCDate() + weekly);
        }

// Output
        var patient = document.getElementById("patientName").value || "";
        var result = "<div style=\"text-align:left;font-weight:500;font-size:18px;line-height:1.1;margin-bottom:4px;\">" + patient + "</div>";
        result += "<table>";
        result += "<tr><td>Début</td><td>Fin</td><td>Préparé par</td><td>Vérification</td><td>Changement</td></tr>";
        var rowsToPrint = StartdateArray.length;
        for (var i = 0; i < rowsToPrint; i++) {
            var d1 = StartdateArray[i] || "";
            var d2 = EnddateArray[i] || "";
            result += "<tr>";
            result += "<td style='width:70px'>" + d1 + "</td>";
            result += "<td style='width:70px'>" + d2 + "</td><td style='width:150px'></td><td style='width:150px'></td><td style='width:150px'></td>";
            result += "</tr>";
        }
        document.getElementById("printout").innerHTML = result;

    }
</script>
<div class="ui-panel">
  <div class="ui-head">
    <h1>Calendrier Pilulier</h1>
    <p>Complétez les champs, puis cliquez Soumettre et Impression.</p>
  </div>
  <div class="ui-body">
<form>
<table id="optionsTable">
    <tbody><tr>
        <td>Patient:</td>
        <td><input type="text" id="patientName"></td>
    </tr>
    <tr>
        <td>Date de début:</td>
        <td><input type="date" id="startDate" value="yyyy-mm-dd"></td>
    </tr>
    <tr>
        <td>Fréquence:</td>
        <td style="text-align:left;">
            <div class="freq-wrap">
              <label><input type="radio" name="freq" id="q7j" checked=""> Hebdomadaire</label>
              <label><input type="radio" name="freq" id="q14j"> Aux 2 semaines</label>
              <label><input type="radio" name="freq" id="q28j"> Aux 4 semaines</label>
            </div>
        </td>
    </tr>

</tbody></table>
<div class="actions">
<input class="btn" onclick="calculate()" type="button" value="Soumettre">
<input class="btn secondary" type="button" onclick="printDiv('printableArea')" value="Impression">
</div>
</form>
  </div>
</div>

<div id="printableArea">
    <a id="printout"></a>
</div>


</body></html>
