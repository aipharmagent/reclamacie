<!doctype html>
<html lang='fr-CA'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Reclamacie — Suivis cliniques</title>
  <link rel='stylesheet' href='./styles.css' />
</head>
<body>
  <header class='topbar'>
    <h1>Registre de suivis cliniques</h1>
  </header>

  <main class='container'>
    <section class='panel'>
      <h2>Nouveau suivi</h2>
      <form id='entryForm' class='grid'>
        <label>Date<input type='date' name='date' required /></label>
        <label>Rx #<input type='text' name='rxNumber' required /></label>
        <label>Rx Ref #<input type='text' name='rxRef' /></label>
        <label>Acte
          <select name='acte' required>
            <option value=''>Choisir…</option>
            <option>suivi clinique</option>
            <option>vaccination</option>
            <option>labo</option>
            <option>autre</option>
          </select>
        </label>
        <label>Intervalle (jours)<input type='number' min='1' name='intervalDays' value='7' required /></label>
        <label>Nb de suivis planifiés<input type='number' min='1' name='plannedCount' value='2' required /></label>
        <label>Statut initial
          <select name='status'>
            <option>À faire</option>
            <option>En cours</option>
            <option>Complété</option>
            <option>Reporté</option>
          </select>
        </label>
        <label>Initiales<input type='text' name='initials' maxlength='6' /></label>
        <label class='full'>Note<textarea name='notes' rows='2'></textarea></label>
        <div class='full actions'>
          <button type='submit' id='submitBtn'>Ajouter le suivi</button>
          <button type='button' id='btnSample' class='secondary'>Ajouter exemple</button>
          <button type='button' id='btnCancelEdit' class='secondary hidden'>Annuler édition</button>
        </div>
      </form>
    </section>

    <section class='panel'>
      <h2>Priorités</h2>
      <div class='kpis' id='kpis'></div>
      <div id='alertBox' class='alert hidden'></div>
    </section>

    <section class='panel'>
      <h2>Filtres & outils</h2>
      <div class='filters'>
        <input id='search' placeholder='Recherche Rx / note / acte' />
        <select id='statusFilter'>
          <option value=''>Tous statuts</option>
          <option>À faire</option>
          <option>En cours</option>
          <option>Complété</option>
          <option>Reporté</option>
        </select>
        <select id='dueFilter'>
          <option value=''>Toutes échéances</option>
          <option value='overdue'>En retard</option>
          <option value='today'>Aujourd'hui</option>
          <option value='7days'>7 prochains jours</option>
        </select>
        <input id='initialsFilter' placeholder='Initiales' />
<select id="acteFilter">
  <option value="">Tous actes</option>
  <option>suivi clinique</option>
  <option>vaccination</option>
  <option>labo</option>
  <option>autre</option>
        </select>
      </div>
      <div class='actions'>
        <button id='btnExportJson'>Exporter JSON</button>
        <button id='btnExportCsv' class='secondary'>Exporter CSV</button>
        <label class='fileLike'>Importer (JSON/CSV)
          <input type='file' id='importFile' accept='.json,.csv,text/csv,application/json' />
        </label>
        <button id='btnResolveOverdue' class='secondary'>Rattrapage en retard</button>
        <button id='btnDeduplicate' class='secondary'>Nettoyer doublons</button>
        <button id='btnPrint' class='secondary'>Imprimer</button>
        <button id='btnResetAll' class='secondary'>Réinitialiser les données</button>
      </div>
    </section>

    <section class='panel suivis-panel'>
      <h2>Suivis</h2>
      <h2 class='print-title'>Suivis cliniques</h2>
      <div class='tableWrap'>
        <table>
          <colgroup class="suivis-cols">
            <col class="c-select">
            <col class="c-date">
            <col class="c-rx">
            <col class="c-ref">
            <col class="c-acte">
            <col class="c-due">
            <col class="c-prog">
            <col class="c-status">
            <col class="c-init">
            <col class="c-notes">
          </colgroup>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" title="Tout sélectionner"></th>
              <th>Date</th>
              <th>Rx</th>
              <th>Ref</th>
              <th>Acte</th>
              <th>Prochain suivi</th>
              <th>Progrès</th>
              <th>Statut</th>
              <th>Initiales</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id='rows'></tbody>
        </table>
      </div>

      <div id="bulkToolbar" class="bulk-toolbar hidden">
        <span><strong id="selectedCount">0</strong> sélectionné(s)</span>
        <button id="btnBulkMarkDone">✓ Fait</button>
        <button id="btnBulkAdd">+ Ajout</button>
        <button id="btnBulkRemove">- Retrait</button>
        <button id="btnBulkReport">Reporter</button>
        <button id="btnBulkEdit" disabled>Modifier</button>
        <button id="btnBulkDelete" class="secondary danger">Supprimer</button>
        <button id="btnBulkFinish" class="secondary">Fin de suivi</button>
        <button class="secondary" onclick="clearSelection()">Annuler</button>
      </div>
    </section>
  </main>

  <template id='rowTemplate'>
    <tr class="selectable-row">
      <!-- Checkbox ajouté dynamiquement -->
      <td data-k='date'></td>
      <td data-k='rx'></td>
      <td data-k='ref'></td>
      <td data-k='acte'></td>
      <td data-k='due'></td>
      <td data-k='progress'></td>
      <td><span data-k='status' class='badge'></span></td>
      <td data-k='initials'></td>
      <td data-k='notes'></td>
    </tr>
  </template>

  <script src='./app.js'></script>
</body>
</html>
